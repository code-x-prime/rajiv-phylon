name: Deploy Rajiv Admin Panel (Vite)

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Admin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=== Diagnostic Run 2 ==="
            ls -la /root/rajiv-phylon
            exit 1
