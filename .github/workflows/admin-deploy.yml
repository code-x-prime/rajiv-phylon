name: Deploy Rajiv Admin Panel (Vite)

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Admin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=== Starting Admin Panel Deployment ==="
            cd "${{ secrets.PROJECT_PATH }}" || cd $HOME/rajiv-phylon || cd /r"o"ot/rajiv-phylon || cd /home/ubuntu/rajiv-phylon
            
            echo "--- Fetching latest code from Git ---"
            git pull origin main

            echo "--- Deploying Admin Panel ---"
            cd admin
            echo "Cleaning node_modules and Dist build folder..."
            rm -rf node_modules dist
            echo "Installing admin dependencies..."
            npm install --legacy-peer-deps
            echo "Building Admin Panel..."
            npm run build
            echo "Restarting admin process under PM2..."
            pm2 restart rajiv-admin || pm2 start "npm run preview -- --host 0.0.0.0 --port 4173" --name rajiv-admin
            
            echo "=== Admin Panel Deployment Finished Successfully! ==="
            pm2 status
