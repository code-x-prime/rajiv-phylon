name: Deploy Rajiv Server (Express)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Express Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=== Starting Express Server Deployment ==="
            if [ -n "${{ secrets.PROJECT_PATH }}" ] && [ -d "${{ secrets.PROJECT_PATH }}" ]; then
              cd "${{ secrets.PROJECT_PATH }}"
            elif [ -d "$HOME/rajiv-phylon" ]; then
              cd "$HOME/rajiv-phylon"
            elif [ -d "/r"o"ot/rajiv-phylon" ]; then
              cd "/r"o"ot/rajiv-phylon"
            else
              cd /home/ubuntu/rajiv-phylon
            fi
            
            echo "--- Fetching latest code from Git ---"
            git pull origin main

            echo "--- Deploying Server ---"
            cd server
            echo "Cleaning node_modules..."
            rm -rf node_modules
            echo "Installing server dependencies..."
            npm install --legacy-peer-deps
            echo "Generating Prisma Client..."
            npx prisma generate
            echo "Restarting server process under PM2..."
            pm2 restart rajiv-server || pm2 start npm --name rajiv-server -- run start
            
            echo "=== Server Deployment Finished Successfully! ==="
            pm2 status
